<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Pixel Farm</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #a2d149; font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; touch-action: manipulation; }
        #header { background: #5d4037; color: white; padding: 10px; display: flex; justify-content: space-around; font-weight: bold; }
        .farm { width: 100vw; height: 80vh; position: relative; }
        .chicken { font-size: 40px; position: absolute; cursor: pointer; user-select: none; transition: all 0.5s ease; }
        #shop-btn { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); 
                    background: #ff9800; border: none; padding: 15px 30px; border-radius: 25px; 
                    color: white; font-size: 18px; box-shadow: 0 4px #e68a00; }
        #shop-btn:active { box-shadow: none; transform: translateX(-50%) translateY(4px); }
    </style>
</head>
<body>
    <div id="header">
        <span>🥚 Яєць: <span id="egg-count">0</span></span>
        <span>🐥 Курей: <span id="chick-count">1</span></span>
    </div>

    <div class="farm" id="farm">
        <div class="chicken" id="c1" onclick="collectEgg(this)">🐥</div>
    </div>

    <button id="shop-btn" onclick="buyChicken()">Купити курку (10 🥚)</button>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        let eggs = 0;
        let chickens = 1;

        // Функція збору яєць
        function collectEgg(element) {
            eggs++;
            document.getElementById('egg-count').innerText = eggs;
            
            // Ефект "стрибка" при кліку
            element.style.transform = "scale(1.3)";
            setTimeout(() => element.style.transform = "scale(1)", 100);
            
            tg.HapticFeedback.impactOccurred('light');
        }

        // Функція купівлі нової курки
        function buyChicken() {
            if (eggs >= 10) {
                eggs -= 10;
                chickens++;
                document.getElementById('egg-count').innerText = eggs;
                document.getElementById('chick-count').innerText = chickens;
                
                createChicken();
            } else {
                tg.showAlert("Тобі треба 10 яєць!");
            }
        }

        // Створення візуальної курки
        function createChicken() {
            const chick = document.createElement('div');
            chick.className = 'chicken';
            chick.innerText = '🐥';
            chick.style.left = Math.random() * 80 + 'vw';
            chick.style.top = Math.random() * 70 + 'vh';
            chick.onclick = function() { collectEgg(this); };
            document.getElementById('farm').appendChild(chick);
            
            moveChicken(chick);
        }

        // Рух курей
        function moveChicken(el) {
            setInterval(() => {
                el.style.left = Math.random() * 80 + 'vw';
                el.style.top = Math.random() * 70 + 'vh';
            }, 3000);
        }

        // Запускаємо рух першої курки
        moveChicken(document.getElementById('c1'));
    </script>
</body>
</html>
